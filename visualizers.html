<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Visualizers — ullhexa</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #070709;
        color: #fff;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      .wrap {
        width: min(760px, 92vw);
        border: 1px solid #2a2a32;
        border-radius: 16px;
        padding: 28px;
        background: rgba(255,255,255,0.03);
      }
      h1 {
        margin: 0 0 8px;
        font-size: 28px;
      }
      p {
        margin: 0 0 18px;
        color: #cfd3df;
      }
      .buttons {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 12px;
      }
      a.btn {
        display: inline-block;
        text-align: center;
        text-decoration: none;
        color: #fff;
        border: 1px solid #3d3d49;
        border-radius: 12px;
        padding: 14px 16px;
        background: rgba(255,255,255,0.05);
      }
      a.btn:hover {
        background: rgba(255,255,255,0.14);
      }
      .back {
        margin-top: 14px;
        display: inline-block;
        color: #bbb;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <h1>Visualizers</h1>
      <p>Choose input type:</p>
      <div class="buttons">
        <a class="btn" href="./midi-visualizers.html" target="_blank" rel="noreferrer">MIDI Visualizers</a>
        <a class="btn" href="./audio-visualizers.html" target="_blank" rel="noreferrer">Audio Visualizers</a>
      </div>
      <a class="back" href="./index.html">← Back to site</a>
    </main>
  </body>
</html>
